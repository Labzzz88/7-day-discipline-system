<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Your Copy — 7-Day No-Motivation Discipline System</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .form-wrapper {
      max-width: 480px;
      margin: 60px auto;
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
    }
    .form-wrapper h1 { color: #007bff; margin-bottom: 8px; }
    .form-wrapper p  { color: #666; margin-bottom: 24px; }
    .form-wrapper label {
      display: block;
      text-align: left;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .form-wrapper input[type="text"],
    .form-wrapper input[type="email"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
      margin-bottom: 20px;
      box-sizing: border-box;
    }
    .form-wrapper input:focus {
      outline: 2px solid #007bff;
      outline-offset: 2px;
      border-color: #007bff;
    }
    .form-wrapper button {
      background-color: #007bff;
      color: white;
      padding: 14px 30px;
      border: none;
      border-radius: 5px;
      font-size: 1.1rem;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.3s;
    }
    .form-wrapper button:hover { background-color: #0056b3; }
    .form-wrapper button:focus {
      outline: 2px solid #007bff;
      outline-offset: 2px;
    }
    .note {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="form-wrapper">
    <h1>Almost there! 🎉</h1>
    <p>Enter your details below and we'll send your <strong>7-Day No-Motivation Discipline System</strong> to your email.</p>

    <form action="https://formspree.io/f/xdabaeng" method="POST">

      <label for="name">Name:</label>
      <input type="text" id="name" name="name" placeholder="Your full name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="yourname@email.com" required>

      <!-- Redirect to a thank-you message after submit -->
      <input type="hidden" name="_next" value="https://labzzz88.github.io/7daysystem/thank-you.html">
      <input type="hidden" name="_subject" value="New order — 7-Day Discipline System">

      <button type="submit">✅ Submit & Get Access</button>
    </form>

    <p class="note">📧 Check your inbox (and spam folder) after submitting.</p>
  </div>

</body>
</html>
